spring.application.name=ems-dblms-backend

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Cloud environment mappings (Render will inject these values dynamically)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Safety management for JPA entity syncing
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Pulls from the secure Render environment variable.
# If it's not found (like when you run it locally), it uses the fallback string after the colon.
jwt.secret=${JWT_SECRET_KEY:your-super-secret-secure-key-that-must-be-at-least-256-bits-long!}

#server.port=8081
